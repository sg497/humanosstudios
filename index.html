<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Humanus Studio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* FUNDO PRETO + BLUR ELEGANTE */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at top, rgba(0,255,136,0.15), transparent 60%),
radial-gradient(circle at bottom, rgba(0,255,136,0.08), transparent 60%);
filter: blur(0px);
z-index:-1;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid #111;
position:sticky;
top:0;
background:#000;
z-index:100;
}

/* LOGO ANIMADO */
header h1{
font-size:22px;
opacity:0;
transform:translateY(-20px);
animation:logoIn 1.2s ease forwards;
}

header h1 span{
color:#00ff88;
text-shadow:0 0 10px #00ff88;
}

/* NAV */
nav a{
color:#fff;
margin-left:20px;
text-decoration:none;
font-size:14px;
transition:0.3s;
}

nav a:hover{
color:#00ff88;
}

/* HERO */
.hero{
height:85vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h2{
font-size:3rem;
animation:fadeIn 1.5s ease;
}

.hero h2 span{
color:#00ff88;
text-shadow:0 0 10px #00ff88;
}

.hero p{
margin-top:10px;
max-width:600px;
color:#bbb;
}

/* SECTIONS */
section{
padding:60px 20px;
max-width:1100px;
margin:auto;
text-align:center;
}

h2{
margin-bottom:25px;
}

/* FOTOGRAFIAS */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
justify-items:center;
margin-top:20px;
}

.gallery img{
width:100%;
max-width:200px;
height:150px;
object-fit:cover;
border-radius:12px;
transition:0.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

/* VIDEOS */
.videos{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.card{
background:#111;
border-radius:14px;
overflow:hidden;
width:260px;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card video{
width:100%;
height:170px;
object-fit:cover;
}

.card h3{
color:#00ff88;
margin:10px 0 5px;
}

.card p{
font-size:13px;
color:#bbb;
padding:0 10px 15px;
}

/* CONTACTO */
#contacto a{
color:#00ff88;
text-decoration:none;
font-weight:bold;
}

/* LIGHTBOX */
#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
justify-content:center;
align-items:center;
z-index:999;
}

#lightbox img{
max-width:85%;
max-height:85%;
border-radius:12px;
}

#lightbox span{
position:absolute;
top:20px;
right:30px;
font-size:40px;
cursor:pointer;
color:#fff;
}

/* ANIMAÇÕES */
@keyframes logoIn{
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<h1>Humanus <span>Studio</span></h1>
<nav>
<a href="#inicio">Início</a>
<a href="#fotografias">Fotografias</a>
<a href="#videos">Vídeos</a>
<a href="#contactos">Contactos</a>
</nav>
</header>

<!-- HERO -->
<div class="hero" id="inicio">
<h2>Humanus <span>Studio</span></h2>
<p>Fotografia e vídeo com identidade visual forte e criativa.</p>
</div>

<!-- FOTOGRAFIAS -->
<section id="fotografias">
<h2>Fotografias</h2>

<div class="gallery">
<img src="Imagens/catal.JPG">
<img src="Imagens/Rs.JPG">
<img src="Imagens/So.JPG">
<img src="Imagens/jess.JPG">
<img src="Imagens/PAST.JPG">
</div>
</section>

<!-- VIDEOS -->
<section id="videos">
<h2>Vídeos</h2>

<div class="videos">

<div class="card">
<video controls>
<source src="Vídeos/87dfa601-6606-4694-99df-9c930dbc65e9.MOV" type="video/quicktime">
<source src="Vídeos/87dfa601-6606-4694-99df-9c930dbc65e9.MOV" type="video/mp4">
</video>
<h3>Produção</h3>
<p>Conteúdo audiovisual profissional.</p>
</div>

</div>
</section>

<!-- CONTACTOS -->
<section id="contactos">
<h2>Contactos:</h2>

<p>+244 933580515</p>
<br>
<a href="https://wa.me/244933580515" target="_blank">WhatsApp</a>
</section>

<footer style="padding:20px;text-align:center;border-top:1px solid #111;">
© Humanus Studio
</footer>

<!-- LIGHTBOX -->
<div id="lightbox">
<span onclick="fechar()">&times;</span>
<img id="lightbox-img">
</div>

<script>
const imgs=document.querySelectorAll(".gallery img");
const box=document.getElementById("lightbox");
const boxImg=document.getElementById("lightbox-img");

imgs.forEach(img=>{
img.onclick=()=>{
box.style.display="flex";
boxImg.src=img.src;
}
});

function fechar(){
box.style.display="none";
}

box.onclick=(e)=>{
if(e.target!==boxImg){
box.style.display="none";
}
}
</script>

</body>
</html>
